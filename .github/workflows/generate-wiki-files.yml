name: Generate Wiki Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-wiki-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-save prismarine-nbt pngjs

      - name: Cache vanilla assets
        uses: actions/cache@v4
        with:
          path: .cache/vanilla-assets
          key: vanilla-assets-${{ hashFiles('release_infos.yml', 'pack.mcmeta') }}

      - name: Check wiki source files
        id: wiki_sources
        shell: bash
        run: |
          set -euo pipefail

          if find data -path "*/loot_table/*.json" -type f -print -quit 2>/dev/null | grep -q .; then
            echo "has_loot_tables=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_loot_tables=false" >> "$GITHUB_OUTPUT"
            echo "No loot table JSON files found; skipping loot table markdown generation."
          fi

          if find data -path "*/worldgen/structure/*.json" -type f -print -quit 2>/dev/null | grep -q .; then
            echo "has_worldgen_structures=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_worldgen_structures=false" >> "$GITHUB_OUTPUT"
            echo "No worldgen structure JSON files found."
          fi

          if find data -path "*/structure/*.nbt" -type f -print -quit 2>/dev/null | grep -q .; then
            echo "has_structure_nbt=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_structure_nbt=false" >> "$GITHUB_OUTPUT"
            echo "No structure NBT files found."
          fi

      - name: Download vanilla assets
        if: steps.wiki_sources.outputs.has_structure_nbt == 'true'
        run: node scripts/download-vanilla-assets.js

      - name: Generate loot table markdown
        if: steps.wiki_sources.outputs.has_loot_tables == 'true'
        run: node scripts/generate-loot-tables.js

      - name: Generate structure markdown
        if: steps.wiki_sources.outputs.has_worldgen_structures == 'true' || steps.wiki_sources.outputs.has_structure_nbt == 'true'
        run: node scripts/generate-structures.js

      - name: Generate structure preview images
        if: steps.wiki_sources.outputs.has_structure_nbt == 'true'
        env:
          # Allows big assembled jigsaw structures to use a larger canvas instead
          # of being squeezed into a fixed viewport. The script still scales down
          # if either cap would be exceeded.
          STRUCTURE_PREVIEW_PADDING: 128
          STRUCTURE_PREVIEW_MAX_SIZE: 8192
          STRUCTURE_PREVIEW_MAX_PIXELS: 100000000
        run: node scripts/generate-structure-previews.js

      - name: Show generated wiki files
        run: |
          echo "Generated markdown files:"
          find wiki/markdown -type f -name "*.md" -print | sort || true
          echo ""
          echo "Generated structure preview images:"
          find wiki/images/structures -type f -name "*.png" -print | sort || true
          echo ""
          echo "Git status:"
          git status --short


      - name: Commit generated wiki files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A wiki/markdown
          if find wiki/images/structures -type f -name "*.png" -print -quit 2>/dev/null | grep -q .; then
            git add -f wiki/images/structures/**/*.png
          fi

          if git diff --cached --quiet; then
            echo "No generated wiki changes to commit."
            exit 0
          fi

          git commit -m "Generate wiki files"
          git push
