name: Publish Modrinth Releases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-modrinth:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Download GitHub release assets and publish to Modrinth
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: python tools/scripts/upload-version-to-modrinth.py
