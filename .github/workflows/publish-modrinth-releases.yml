name: Publish Modrinth Releases

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-modrinth:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Download GitHub release assets and publish to Modrinth
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from urllib.parse import quote

          import requests
          import yaml

          ROOT = Path(".").resolve()
          DOWNLOADS = ROOT / "modrinth_uploads"
          DOWNLOADS.mkdir(exist_ok=True)

          gh_token = os.environ["GH_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]
          modrinth_token = os.environ.get("MODRINTH_TOKEN", "").strip()

          if not modrinth_token:
              raise RuntimeError("MODRINTH_TOKEN secret is missing")

          release_info_path = ROOT / "release_infos.yml"
          if not release_info_path.exists():
              raise FileNotFoundError("release_infos.yml not found")

          with release_info_path.open("r", encoding="utf-8") as f:
              release_info = yaml.safe_load(f) or {}

          details = release_info.get("Details", {}) or {}
          version = str(details.get("Version number", "")).strip()
          version_type = str(details.get("Version type", "Release")).strip().lower()
          version_subtitle = str(details.get("Version subtitle", "")).strip()

          if not version:
              raise ValueError("Details -> Version number missing in release_infos.yml")

          if version_type not in {"release", "beta", "alpha"}:
              raise ValueError("Details -> Version type must be Release, Beta, or Alpha")

          game_versions = [str(v) for v in release_info.get("Meta Data", {}).get("Versions", [])]
          if not game_versions:
              raise ValueError("Meta Data -> Versions missing in release_infos.yml")

          file_names = release_info.get("File Name", {}) or {}
          project_ids = release_info.get("Project-ID", {}) or {}

          RELEASE_INFO_KEY = {
              "main": "Main",
              "resources": "Resources",
              "ambient": "Ambient",
              "deep_blue": "Deep Blue",
              "dungeons": "Dungeons",
              "villages": "Villages",
          }

          DEFAULT_FILE_NAMES = {
              "main": "Katters Structures",
              "resources": "Katters Structures Resource Pack",
              "ambient": "Katters Structures Only Ambient",
              "deep_blue": "Katters Structures Only Deep Blue",
              "dungeons": "Katters Structures Only Dungeons",
              "villages": "Katters Structures Only Villages",
          }

          def release_info_name(key: str) -> str:
              return RELEASE_INFO_KEY[key]

          def display_file_name(key: str) -> str:
              value = str(file_names.get(release_info_name(key), "")).strip()
              value = value or DEFAULT_FILE_NAMES[key]
              value = value.replace(".", " ")
              value = " ".join(value.split())
              return value

          def release_title(key: str) -> str:
              return f"{display_file_name(key)} v{version}"

          def tag_slug(text: str) -> str:
              slug = text.lower()
              slug = re.sub(r"[^a-z0-9]+", "-", slug)
              slug = slug.strip("-")
              return slug or "release"

          def tag_for(key: str) -> str:
              return f"{tag_slug(display_file_name(key))}-v{version}"

          def expected_asset_name(key: str, extension: str) -> str:
              return f"{release_title(key)}.{extension}"

          def project_id_for(key: str) -> str:
              project_id = str(project_ids.get(release_info_name(key), "")).strip()
              if not project_id:
                  raise ValueError(f"Project-ID -> {release_info_name(key)} missing in release_infos.yml")
              return project_id

          def changelog_path_for(key: str) -> Path:
              if key == "main":
                  return ROOT / "changelog.log"
              folder = key
              return ROOT / "sub_packs" / folder / "changelog.log"

          gh_headers = {
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          asset_headers = {
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/octet-stream",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          modrinth_headers = {
              "Authorization": modrinth_token,
              "User-Agent": "Katters-Structures-GitHub-Action",
          }

          def get_release_by_tag(tag: str) -> dict:
              response = requests.get(
                  f"https://api.github.com/repos/{repo}/releases/tags/{quote(tag)}",
                  headers=gh_headers,
                  timeout=120,
              )

              if response.status_code >= 300:
                  print(response.text)
                  raise RuntimeError(f"Could not find GitHub release for tag {tag}: HTTP {response.status_code}")

              return response.json()

          def download_asset_from_release(release: dict, asset_name: str) -> Path:
              assets = release.get("assets", [])
              asset = next((a for a in assets if a.get("name") == asset_name or a.get("label") == asset_name), None)

              if asset is None:
                  available = ", ".join(a.get("name", "<unnamed>") for a in assets)
                  raise FileNotFoundError(
                      f"Asset '{asset_name}' not found in release '{release.get('name')}'. "
                      f"Available assets: {available}"
                  )

              output_path = DOWNLOADS / asset_name
              download_url = asset["url"]

              response = requests.get(download_url, headers=asset_headers, timeout=300)
              if response.status_code >= 300:
                  print(response.text)
                  raise RuntimeError(f"Failed to download asset {asset_name}: HTTP {response.status_code}")

              output_path.write_bytes(response.content)
              print(f"Downloaded {asset_name}")
              return output_path

          def read_changelog(key: str) -> str:
              path = changelog_path_for(key)
              if not path.exists():
                  raise FileNotFoundError(f"Changelog missing: {path}")
              return path.read_text(encoding="utf-8")

          def create_modrinth_version(
              *,
              key: str,
              file_path: Path,
              name: str,
              version_number: str,
              loaders,
              content_type: str,
          ):
              if not file_path.exists():
                  raise FileNotFoundError(f"Release file missing: {file_path}")

              payload = {
                  "project_id": project_id_for(key),
                  "name": name,
                  "version_number": version_number,
                  "changelog": read_changelog(key),
                  "dependencies": [],
                  "game_versions": game_versions,
                  "version_type": version_type,
                  "loaders": loaders,
                  "featured": True,
                  "status": "listed",
                  "file_parts": ["file"],
                  "primary_file": "file",
              }

              with file_path.open("rb") as f:
                  response = requests.post(
                      "https://api.modrinth.com/v2/version",
                      headers=modrinth_headers,
                      files={
                          "data": (None, json.dumps(payload), "application/json"),
                          "file": (file_path.name, f, content_type),
                      },
                      timeout=300,
                  )

              if response.status_code >= 300:
                  print(response.text)
                  raise RuntimeError(f"Failed to upload {file_path.name} to Modrinth: HTTP {response.status_code}")

              print(f"Uploaded {name} to Modrinth")

          keys = ["main", "resources", "ambient", "deep_blue", "dungeons", "villages"]

          for key in keys:
              release = get_release_by_tag(tag_for(key))
              title = release_title(key)

              zip_asset = download_asset_from_release(release, expected_asset_name(key, "zip"))

              if key == "resources":
                  create_modrinth_version(
                      key=key,
                      file_path=zip_asset,
                      name=title,
                      version_number=version,
                      loaders=["resourcepack"],
                      content_type="application/zip",
                  )
                  continue

              jar_asset = download_asset_from_release(release, expected_asset_name(key, "jar"))

              create_modrinth_version(
                  key=key,
                  file_path=zip_asset,
                  name=f"{title} - Data Pack",
                  version_number=version,
                  loaders=["datapack"],
                  content_type="application/zip",
              )

              create_modrinth_version(
                  key=key,
                  file_path=jar_asset,
                  name=f"{title} - Universal Mod",
                  version_number=f"{version}-mod",
                  loaders=["fabric", "forge", "quilt", "neoforge"],
                  content_type="application/java-archive",
              )
          PY
